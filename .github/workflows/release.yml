name: Release

# Release publishing, driven entirely by release-please (kept separate from CI).
#
# Every push to main updates a release PR. Merging it cuts a DRAFT release + tag,
# which fans out to the build jobs. Assets are attached and the release is only
# made visible (undrafted, marked latest) + :latest / Homebrew updated once every
# artifact succeeds — so a failed build never leaves a visible, partial release.
#
# To retry a failed release: delete the draft release + tag
# (`gh release delete <tag> --yes --cleanup-tag`), then re-run release-please
# (it re-opens the release PR); merging it rebuilds with the current workflow.

on:
  push:
    branches: [main]

# Never cancel an in-flight release; overlapping releases would race on tags/tap.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Locked down by default; each job opts into exactly what it needs.
permissions: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # release-please bumps [workspace.package].version via the toml updater but
      # cannot update Cargo.lock's member entries (the cargo-workspace plugin
      # rejects `version.workspace = true`). Let cargo sync the lockfile on the
      # release PR branch — authoritative, touches only workspace members.
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        if: steps.rp.outputs.pr
        with:
          ref: ${{ fromJSON(steps.rp.outputs.pr).headBranchName }}
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        if: steps.rp.outputs.pr
        with:
          toolchain: stable
      - name: Sync Cargo.lock on the release PR
        if: steps.rp.outputs.pr
        run: |
          cargo update --workspace
          if git diff --quiet Cargo.lock; then
            echo "Cargo.lock already in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: sync Cargo.lock for release"
          git push

  # --- Standalone Linux binaries (native runners; no cross-compile) ---------
  build-linux:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: true
      matrix:
        # aws-lc-rs requires glibc >= 2.38 to link (its objects reference
        # __isoc23_* symbols), so we build on 24.04 and run on the matching
        # distroless/cc-debian13 image (glibc 2.41). The binaries therefore need
        # a glibc >= 2.38 host (Ubuntu 24.04+/Debian 13+).
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}
      - name: Install aws-lc-rs build deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake clang
      - name: Build vibecast (release)
        run: cargo build -p vibecast-cli --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          name="vibecast-${{ needs.release-please.outputs.tag }}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/vibecast" "dist/$name/vibecast"
          cp LICENSE README.md "dist/$name/"
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          (cd dist && sha256sum "$name.tar.gz" > "$name.tar.gz.sha256")
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  # --- Standalone macOS binary (Apple Silicon only) -------------------------
  build-macos:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-aarch64-apple-darwin
      - name: Build vibecast (release)
        run: cargo build -p vibecast-cli --release --locked --target aarch64-apple-darwin
      - name: Package
        run: |
          name="vibecast-${{ needs.release-please.outputs.tag }}-aarch64-apple-darwin"
          mkdir -p "dist/$name"
          cp "target/aarch64-apple-darwin/release/vibecast" "dist/$name/vibecast"
          cp LICENSE README.md "dist/$name/"
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          (cd dist && shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256")
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-arm64
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  # --- Signed Android APK ---------------------------------------------------
  build-android:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Install SDK packages (NDK r28 + platform/build-tools 36)
        run: |
          sdkmanager "ndk;28.2.13676358" "platforms;android-36" "build-tools;36.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.2.13676358" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-android
      - uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: cargo-ndk
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
      - name: Verify signature + package
        run: |
          apk=$(find android/app/build/outputs/apk/release -name '*.apk' | head -n1)
          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" verify --verbose "$apk"
          mkdir -p dist
          out="dist/vibecast-${{ needs.release-please.outputs.tag }}.apk"
          cp "$apk" "$out"
          (cd dist && sha256sum "$(basename "$out")" > "$(basename "$out").sha256")
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android
          path: |
            dist/*.apk
            dist/*.sha256
          if-no-files-found: error

  # --- Multi-arch container image (assembled from prebuilt binaries) --------
  docker:
    needs: [release-please, build-linux]
    if: needs.release-please.outputs.release_created == 'true' && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: linux-*
          path: artifacts
      - name: Stage binaries + Dockerfile into a clean build context (no recompile)
        run: |
          set -euo pipefail
          tag='${{ needs.release-please.outputs.tag }}'
          for arch in amd64 arm64; do
            case "$arch" in
              amd64) triple=x86_64-unknown-linux-gnu ;;
              arm64) triple=aarch64-unknown-linux-gnu ;;
            esac
            mkdir -p "ctx/linux/$arch"
            tar -xzf "artifacts/linux-$arch/vibecast-$tag-$triple.tar.gz" -C /tmp
            cp "/tmp/vibecast-$tag-$triple/vibecast" "ctx/linux/$arch/vibecast"
          done
          cp docker/release.Dockerfile ctx/Dockerfile
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push image (version + semver + sha tags)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ctx
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.release-please.outputs.version }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
      - name: Attest image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # --- Attach assets, attest, then promote (visible release + :latest) ------
  publish:
    needs: [release-please, build-linux, build-macos, build-android, docker]
    # All artifacts must exist before we touch the release — the atomicity gate:
    # any build failure means no assets, no promote, no tap, and the release
    # stays a hidden draft.
    if: >-
      needs.release-please.outputs.release_created == 'true' &&
      needs.build-linux.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-android.result == 'success' &&
      needs.docker.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Collect release assets + checksums
        run: |
          set -euo pipefail
          tag='${{ needs.release-please.outputs.tag }}'
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.apk' \) -exec cp {} release/ \;
          (cd release && sha256sum -- *.tar.gz *.apk > "vibecast-$tag-SHA256SUMS.txt")
          ls -l release
      - name: Attest binary provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release/*.tar.gz
            release/*.apk
      - name: Upload assets, add :latest + semver tag, publish the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag='${{ needs.release-please.outputs.tag }}'
          version='${{ needs.release-please.outputs.version }}'
          minor="${version%.*}"
          gh release upload "$tag" release/* --clobber
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
          docker buildx imagetools create \
            -t "$IMAGE_NAME:latest" \
            -t "$IMAGE_NAME:$minor" \
            "$IMAGE_NAME:$version"
          gh release edit "$tag" --draft=false --latest

  # --- Update the public Homebrew tap ---------------------------------------
  homebrew:
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Render formula from release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag='${{ needs.release-please.outputs.tag }}'
          version='${{ needs.release-please.outputs.version }}'
          gh release download "$tag" -p '*SHA256SUMS.txt' -D sums
          sums="sums/vibecast-$tag-SHA256SUMS.txt"
          get() { awk -v f="$1" '$2 ~ f {print $1}' "$sums"; }
          sha_macos=$(get "aarch64-apple-darwin.tar.gz")
          sha_linux_arm=$(get "aarch64-unknown-linux-gnu.tar.gz")
          sha_linux_amd=$(get "x86_64-unknown-linux-gnu.tar.gz")
          base="https://github.com/${{ github.repository }}/releases/download/$tag"
          sed \
            -e "s|__VERSION__|$version|g" \
            -e "s|__TAG__|$tag|g" \
            -e "s|__BASE__|$base|g" \
            -e "s|__SHA_MACOS__|$sha_macos|g" \
            -e "s|__SHA_LINUX_ARM__|$sha_linux_arm|g" \
            -e "s|__SHA_LINUX_AMD__|$sha_linux_amd|g" \
            packaging/homebrew/vibecast.rb.tmpl > vibecast.rb
          cat vibecast.rb
      - name: Commit to tap via deploy key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes"
          git clone git@github.com:${{ github.repository_owner }}/homebrew-vibecast.git tap
          mkdir -p tap/Formula
          cp vibecast.rb tap/Formula/vibecast.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/vibecast.rb
          # --cached so a brand-new (untracked) formula is detected too.
          if git diff --cached --quiet; then echo "formula unchanged"; exit 0; fi
          git commit -m "vibecast ${{ needs.release-please.outputs.version }}"
          git push
