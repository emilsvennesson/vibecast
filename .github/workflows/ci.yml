name: CI

# Pull-request + main validation. Release publishing lives in release.yml so PR
# validation and release are never entangled.
#
# Every job is gated on a `changes` filter so unrelated edits skip irrelevant
# work: a docs-only or Kodi-only change runs nothing heavy; a change confined to
# the desktop-only `vibecast-cli` crate skips Android (the CLI binary is not part
# of the FFI cdylib / APK). A single always-run `ci-success` gate aggregates the
# result so branch protection has one stable required check even when jobs skip.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs; never cancel a run on main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Read-only by default; no job here needs more.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      android: ${{ steps.filter.outputs.android }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'rustfmt.toml'
              - 'rust-toolchain.toml'
              - '.config/nextest.toml'
              - '.github/workflows/ci.yml'
            # Android bundles the whole Rust workspace via the FFI cdylib, so any
            # crate change can affect the APK/bindings. (dorny/paths-filter uses
            # OR semantics, so a '!exclude' pattern would match nearly everything
            # — don't use one here.)
            android:
              - 'android/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            docker:
              - 'Dockerfile'
              - 'docker/**'
              - '.dockerignore'
              - '.github/workflows/ci.yml'

  fmt-clippy:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-stable
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-test-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: cargo-nextest
      - name: nextest
        run: cargo nextest run --all-features --profile ci --locked
      - name: doctests
        run: cargo test --doc --all-features --locked
      - name: Upload JUnit report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-${{ matrix.os }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  msrv:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.87"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: rust-msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: build (declared MSRV)
        run: cargo build --all-targets --all-features --locked

  deny:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: cargo-deny
      - name: cargo-deny
        run: cargo deny check

  android:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'
      # Puts sdkmanager on PATH and accepts SDK licenses.
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Install SDK packages (NDK r28 + platform/build-tools 36)
        run: |
          sdkmanager "ndk;28.2.13676358" "platforms;android-36" "build-tools;36.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.2.13676358" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: android-ndk
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: cargo-ndk
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      # Builds vibecast-ffi per ABI (cargo-ndk), generates the UniFFI Kotlin
      # bindings, then compiles + lints the app (ktlint/detekt/Android Lint).
      - name: Gradle assemble + lint
        working-directory: android
        run: ./gradlew :app:assembleDebug lintDebug ktlintCheck detekt --no-daemon --stacktrace

  docker-build:
    # Validates the from-source Dockerfile recipe (amd64, no push). Scoped to
    # Docker files only — the release image is assembled from prebuilt binaries
    # (release.yml) and the Rust build/test jobs already prove the code compiles.
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image (from source, amd64, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          tags: vibecast:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Single required status check. Always runs; fails if any needed job failed or
  # was cancelled (skipped counts as success), so path-filtered skips never block
  # a PR the way individually-required, path-filtered checks would.
  ci-success:
    if: always()
    needs: [changes, fmt-clippy, test, msrv, deny, android, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job did not succeed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more required jobs failed or were cancelled."
          exit 1
      - name: Success
        run: echo "All required jobs succeeded or were legitimately skipped."
