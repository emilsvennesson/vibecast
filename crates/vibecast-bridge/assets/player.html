<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>vibecast player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
  >
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/shaka-player.compiled.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #050816;
      --bg-1: #0d1735;
      --card: rgba(8, 14, 33, 0.8);
      --line: rgba(132, 164, 230, 0.28);
      --text: #e6edf9;
      --muted: #95a8cf;
      --ok: #72f4b8;
      --warn: #ffd98a;
      --send: #8bb4f8;
      --recv: #b892f4;
      --net: #72d4c0;
      --err: #f87272;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      font-family: "Space Grotesk", "Avenir Next", sans-serif;
      color: var(--text);
      background:
        radial-gradient(120rem 55rem at 15% -20%, #2e8dd5 0%, transparent 55%),
        radial-gradient(90rem 48rem at 100% 0%, #165f92 0%, transparent 60%),
        linear-gradient(170deg, var(--bg-1), var(--bg-0));
      display: grid;
      grid-template-columns: minmax(20rem, 1fr) minmax(24rem, 1.2fr);
      gap: 1rem;
      padding: 1rem;
      overflow: hidden;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 1rem;
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow: 0 1.25rem 2.5rem rgba(2, 8, 26, 0.35);
    }

    /* -- left column: player ------------------------------------------------ */

    .player-col {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 0;
    }

    .playback-card { flex-shrink: 0; }

    .top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem 1rem;
      padding: 0.8rem 1rem;
    }

    .label {
      font-family: "IBM Plex Mono", "SF Mono", monospace;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      display: inline-flex;
      gap: 0.35rem;
      align-items: baseline;
    }

    .value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      text-transform: none;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .status {
      border-radius: 99rem;
      border: 1px solid rgba(114, 244, 184, 0.35);
      padding: 0.28rem 0.65rem;
      color: var(--ok);
      background: rgba(114, 244, 184, 0.13);
    }

    .status[data-connected="false"] {
      color: var(--warn);
      border-color: rgba(255, 217, 138, 0.4);
      background: rgba(255, 217, 138, 0.14);
    }

    .video {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 0.75rem;
      display: block;
    }

    .meta {
      padding: 0.8rem 1rem 1rem;
      display: grid;
      gap: 0.25rem;
    }

    .track-controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.65rem;
      padding: 0.8rem 1rem 0;
    }

    .track-controls[hidden],
    .track-control[hidden] {
      display: none;
    }

    .track-control {
      display: grid;
      gap: 0.35rem;
      min-width: 0;
    }

    .track-control label {
      font-family: "IBM Plex Mono", "SF Mono", monospace;
      color: var(--muted);
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .track-control select {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 0.45rem;
      background: rgba(5, 8, 22, 0.82);
      color: var(--text);
      padding: 0.45rem 0.55rem;
      font: 500 0.78rem "Space Grotesk", "Avenir Next", sans-serif;
    }

    h1 { margin: 0; font-size: 1.15rem; line-height: 1.25; }
    p  { margin: 0; color: var(--muted); font-size: 0.9rem; line-height: 1.4; }

    /* -- catalog-driven app settings ---------------------------------------- */

    .settings-card {
      min-height: 11rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--line);
    }

    .settings-heading {
      display: flex;
      align-items: baseline;
      gap: 0.65rem;
    }

    .settings-heading h2 {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    .settings-heading span,
    .settings-revision {
      font: 500 0.62rem "IBM Plex Mono", "SF Mono", monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .settings-heading span {
      color: var(--ok);
      border: 1px solid rgba(114, 244, 184, 0.35);
      border-radius: 99rem;
      padding: 0.2rem 0.5rem;
    }

    .settings-heading span[data-connected="false"] {
      color: var(--warn);
      border-color: rgba(255, 217, 138, 0.4);
    }

    .settings-kicker {
      font: 500 0.61rem "IBM Plex Mono", "SF Mono", monospace;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .settings-apps {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 0.75rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(132, 164, 230, 0.25) transparent;
    }

    .settings-empty {
      padding: 1.25rem 0.35rem;
      text-align: center;
    }

    .settings-app {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(132, 164, 230, 0.2);
      border-radius: 0.7rem;
      background: rgba(5, 8, 22, 0.4);
    }

    .settings-app + .settings-app { margin-top: 0.75rem; }

    .settings-app::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 0.18rem;
      background: linear-gradient(var(--recv), var(--send));
    }

    .settings-app > header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.65rem 0.8rem 0.65rem 1rem;
      background: rgba(139, 180, 248, 0.06);
    }

    .settings-app h3 {
      margin: 0;
      font-size: 0.87rem;
      font-weight: 600;
    }

    .settings-revision { color: var(--muted); }

    .setting-row {
      display: grid;
      grid-template-columns: minmax(8rem, 1fr) minmax(12rem, 1.15fr);
      align-items: center;
      gap: 0.7rem;
      margin: 0;
      padding: 0.7rem 0.8rem 0.7rem 1rem;
      border-top: 1px solid rgba(132, 164, 230, 0.14);
    }

    .setting-copy { min-width: 0; }

    .setting-copy > label {
      display: block;
      font-size: 0.79rem;
      font-weight: 600;
    }

    .setting-copy p {
      margin-top: 0.18rem;
      font-size: 0.7rem;
      line-height: 1.3;
    }

    .setting-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 0.35rem;
    }

    .setting-actions > input:not([type="checkbox"]),
    .setting-actions > select {
      min-width: 0;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 0.4rem;
      background: rgba(5, 8, 22, 0.82);
      color: var(--text);
      padding: 0.42rem 0.5rem;
      font: 500 0.75rem "Space Grotesk", "Avenir Next", sans-serif;
    }

    .setting-actions button {
      border: 1px solid var(--line);
      border-radius: 0.4rem;
      padding: 0.43rem 0.55rem;
      font: 500 0.67rem "IBM Plex Mono", "SF Mono", monospace;
      cursor: pointer;
    }

    .setting-apply {
      color: #071124;
      border-color: var(--send) !important;
      background: var(--send);
    }

    .setting-reset {
      color: var(--muted);
      background: transparent;
    }

    .setting-actions :disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .settings-toggle {
      position: relative;
      width: 2.35rem;
      height: 1.3rem;
      cursor: pointer;
    }

    .settings-toggle-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .settings-toggle-track {
      position: absolute;
      inset: 0;
      border: 1px solid var(--line);
      border-radius: 99rem;
      background: rgba(5, 8, 22, 0.82);
      transition: 0.15s;
    }

    .settings-toggle-track::after {
      content: "";
      position: absolute;
      top: 0.18rem;
      left: 0.2rem;
      width: 0.8rem;
      height: 0.8rem;
      border-radius: 50%;
      background: var(--muted);
      transition: 0.15s;
    }

    .settings-toggle-input:checked + .settings-toggle-track {
      border-color: var(--ok);
      background: rgba(114, 244, 184, 0.16);
    }

    .settings-toggle-input:checked + .settings-toggle-track::after {
      transform: translateX(1rem);
      background: var(--ok);
    }

    .setting-unsupported {
      grid-column: 1 / -1;
      color: var(--warn);
      font: 0.66rem "IBM Plex Mono", "SF Mono", monospace;
    }

    /* -- right column: log -------------------------------------------------- */

    .log-col {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .log-filters {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .log-filter {
      font-family: "IBM Plex Mono", "SF Mono", monospace;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      border: 1px solid var(--line);
      border-radius: 99rem;
      background: transparent;
      color: var(--muted);
      padding: 0.2rem 0.55rem;
      cursor: pointer;
      transition: all 0.15s;
      opacity: 0.45;
    }

    .log-filter.active { opacity: 1; }
    .log-filter[data-kind="info"].active    { color: var(--muted); border-color: var(--muted); }
    .log-filter[data-kind="ws-send"].active { color: var(--send);  border-color: var(--send); }
    .log-filter[data-kind="ws-recv"].active { color: var(--recv);  border-color: var(--recv); }
    .log-filter[data-kind="net"].active     { color: var(--net);   border-color: var(--net); }
    .log-filter[data-kind="err"].active     { color: var(--err);   border-color: var(--err); }

    /* Hide filtered-out entries */
    .log-entries.hide-info .log-entry.info       { display: none; }
    .log-entries.hide-ws-send .log-entry.ws-send { display: none; }
    .log-entries.hide-ws-recv .log-entry.ws-recv { display: none; }
    .log-entries.hide-net .log-entry.net         { display: none; }
    .log-entries.hide-err .log-entry.err         { display: none; }

    .log-actions {
      display: flex;
      gap: 0.4rem;
    }

    .log-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 0.4rem;
      background: transparent;
      color: var(--muted);
      padding: 0.35rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      line-height: 0;
    }

    .log-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .log-btn:hover {
      color: var(--text);
      border-color: var(--text);
    }

    .log-btn.copied {
      color: var(--ok);
      border-color: var(--ok);
    }

    .log-entries {
      flex: 1;
      overflow-y: scroll;
      overflow-x: hidden;
      padding: 0.5rem 0;
      font-family: "IBM Plex Mono", "SF Mono", monospace;
      font-size: 0.72rem;
      line-height: 1.4;
      color: #c9d8f8;
      scrollbar-width: thin;
      scrollbar-color: rgba(132, 164, 230, 0.25) transparent;
    }

    .log-entries::-webkit-scrollbar { width: 6px; }
    .log-entries::-webkit-scrollbar-track { background: transparent; }
    .log-entries::-webkit-scrollbar-thumb {
      background: rgba(132, 164, 230, 0.25);
      border-radius: 3px;
    }

    .log-entry {
      padding: 0.2rem 1rem;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-entry .ts {
      color: var(--muted);
      user-select: none;
    }

    .log-entry.ws-send { color: var(--send); }
    .log-entry.ws-recv { color: var(--recv); }
    .log-entry.net     { color: var(--net); }
    .log-entry.err     { color: var(--err); }
    .log-entry.info    { color: var(--muted); }

    /* JSON blocks inside log entries */
    .log-json {
      display: block;
      margin: 0.15rem 0 0.15rem 1.2rem;
      padding: 0.35rem 0.6rem;
      border-left: 2px solid var(--line);
      border-radius: 0 0.3rem 0.3rem 0;
      background: rgba(0, 0, 0, 0.25);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 20rem;
      overflow-y: auto;
      font-size: 0.68rem;
      line-height: 1.35;
    }

    /* -- responsive: stack on narrow screens -------------------------------- */

    @media (max-width: 860px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto;
        min-height: 100vh;
        overflow: auto;
      }

      .log-col {
        max-height: 50vh;
      }

      .track-controls {
        grid-template-columns: 1fr;
      }

      .settings-card { min-height: 20rem; }
    }

    @media (max-width: 560px) {
      body { padding: 0.6rem; }

      .setting-row {
        grid-template-columns: 1fr;
      }

      .settings-kicker { display: none; }
    }
  </style>
</head>
<body>
  <div class="player-col">
    <section class="card playback-card">
      <div class="top">
        <div class="label">Connection <span class="value status" data-connected="false" id="connection">connecting</span></div>
        <div class="label">Session <span class="value" id="session">-</span></div>
        <div class="label">State <span class="value" id="state">IDLE</span></div>
      </div>
      <video id="video" class="video" playsinline></video>
      <div class="track-controls" id="track-controls" hidden>
        <div class="track-control" id="quality-control" hidden>
          <label for="quality-select">Quality</label>
          <select id="quality-select"></select>
        </div>
        <div class="track-control" id="audio-control" hidden>
          <label for="audio-select">Audio</label>
          <select id="audio-select"></select>
        </div>
        <div class="track-control" id="text-control" hidden>
          <label for="text-select">Subtitles</label>
          <select id="text-select"></select>
        </div>
      </div>
      <div class="meta">
        <h1 id="title">Waiting for LOAD</h1>
        <p id="subtitle">Open this page on your playback device. It registers over <code>/player</code>.</p>
      </div>
    </section>
    <section class="card settings-card" aria-labelledby="settings-title">
      <div class="settings-header">
        <div class="settings-heading">
          <h2 id="settings-title">App settings</h2>
          <span data-connected="false" id="settings-state">read only</span>
        </div>
        <div class="settings-kicker">server managed</div>
      </div>
      <div class="settings-apps" id="settings-apps"></div>
    </section>
  </div>
  <section class="card log-col">
    <div class="log-header">
      <div class="log-filters">
        <button class="log-filter active" data-kind="info">info</button>
        <button class="log-filter active" data-kind="ws-send">send</button>
        <button class="log-filter active" data-kind="ws-recv">recv</button>
        <button class="log-filter active" data-kind="net">net</button>
        <button class="log-filter active" data-kind="err">err</button>
      </div>
      <div class="log-actions">
        <button class="log-btn" id="btn-clear" title="Clear log"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M5 6v14a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button>
        <button class="log-btn" id="btn-copy" title="Copy log to clipboard"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
      </div>
    </div>
    <div class="log-entries" id="log"></div>
  </section>
  <script defer src="/player.js"></script>
</body>
</html>
