# Rust rewrite of vibecast (see /Users/emil/.claude/plans/fizzy-mixing-donut.md).
# Coexists with the Python tree during migration; Python cutover is the final phase.
[workspace]
resolver = "2"
members = ["crates/vibecast-proto"]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
publish = false

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "sync", "macros", "time"] }
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1"

# Protobuf (CastV2 wire) — protox is a pure-Rust compiler so no `protoc` binary is needed.
prost = "0.14"
prost-build = "0.14"
protox = "0.9"

# Errors / logging
thiserror = "2"
anyhow = "1"
tracing = "0.1"

# Dev / test
proptest = "1"

[profile.release]
strip = true
lto = "thin"
